<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KhabarCheck</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        width: 400px;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        color: #1a1a1a;
      }

      .header {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        color: white;
        padding: 16px;
        border-bottom: 1px solid #e5e7eb;
      }

      .header-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .header-icon {
        width: 24px;
        height: 24px;
        background: white;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #2563eb;
        font-size: 14px;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 700;
      }

      .header p {
        font-size: 12px;
        opacity: 0.9;
      }

      .content {
        padding: 16px;
      }

      .tab-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .tab-btn {
        flex: 1;
        padding: 8px 12px;
        border: none;
        background: #f3f4f6;
        color: #6b7280;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .tab-btn.active {
        background: #2563eb;
        color: white;
      }

      .tab-btn:hover:not(.active) {
        background: #e5e7eb;
      }

      .input-group {
        margin-bottom: 12px;
      }

      .input-group label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #374151;
      }

      .input-group input,
      .input-group textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-family: inherit;
        font-size: 12px;
        transition: border-color 0.2s;
      }

      .input-group input:focus,
      .input-group textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .input-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .word-count {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 4px;
      }

      .analyze-btn {
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
      }

      .analyze-btn:hover {
        background: #1e40af;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .analyze-btn:active {
        transform: translateY(0);
      }

      .analyze-btn:disabled {
        background: #d1d5db;
        cursor: not-allowed;
        transform: none;
      }

      .status {
        padding: 12px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 12px;
        display: none;
      }

      .status.show {
        display: block;
      }

      .status.loading {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #bfdbfe;
      }

      .status.success {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }

      .status.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      .hidden {
        display: none;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid currentColor;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        padding: 12px 16px;
        border-top: 1px solid #e5e7eb;
        font-size: 11px;
        color: #9ca3af;
        text-align: center;
      }

      .footer a {
        color: #2563eb;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-title">
        <div class="header-icon">K</div>
        <div>
          <h1>KhabarCheck</h1>
        </div>
      </div>
      <p>AI-powered news bias detector</p>
    </div>

    <div class="content">
      <div class="status" id="status"></div>

      <div class="tab-buttons">
        <button class="tab-btn active" id="url-tab">URL</button>
        <button class="tab-btn" id="text-tab">Text</button>
      </div>

      <div id="url-section">
        <div class="input-group">
          <label for="url-input">Article URL</label>
          <input type="url" id="url-input" placeholder="https://example.com/article" />
        </div>
      </div>

      <div id="text-section" class="hidden">
        <div class="input-group">
          <label for="text-input">Article Text</label>
          <textarea id="text-input" placeholder="Paste the article text here..."></textarea>
          <div class="word-count"><span id="word-count">0</span> words</div>
        </div>
      </div>

      <button class="analyze-btn" id="analyze-btn">Analyze Article</button>
    </div>

    <div class="footer">
      <a href="https://khabarcheck.com" target="_blank">Visit Website</a> | 
      <a href="https://khabarcheck.com/docs" target="_blank">Help</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
